<!-- APlayer 脚本 -->
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
<!-- MetingJS 音乐解析插件 -->
<script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>

<!-- 播放器初始化 -->
<script>
// 4首网易云音乐歌曲ID
const songIds = [
    '39227633',      // His Theme - Toby Fox
    '399367387',     // 桜ノ詩 - はな
    '509726454',     // Sunshine Girl - moumoon
    '28151052'       // 羽根 - 折戸伸治
];

// Meting API 地址（网易云更稳定）
const metingApi = 'https://api.i-meto.com/meting/api';

// 等待页面加载完成
document.addEventListener('DOMContentLoaded', function() {
    // 逐首加载歌曲
    const audioList = [];
    let loadedCount = 0;

    songIds.forEach((id, index) => {
        fetch(`${metingApi}?server=netease&type=song&id=${id}`)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    const song = data[0];
                    // 修复URL中的转义字符
                    let audioUrl = song.url;
                    if (audioUrl) {
                        audioUrl = audioUrl.replace(/\\\//g, '/');
                        // 确保是 https
                        if (audioUrl.startsWith('http://')) {
                            audioUrl = 'https://' + audioUrl.slice(7);
                        }
                    }
                    
                    let coverUrl = song.pic;
                    if (coverUrl) {
                        coverUrl = coverUrl.replace(/\\\//g, '/');
                        if (coverUrl.startsWith('http://')) {
                            coverUrl = 'https://' + coverUrl.slice(7);
                        }
                    }
                    
                    let lrcUrl = song.lrc;
                    if (lrcUrl) {
                        lrcUrl = lrcUrl.replace(/\\\//g, '/');
                        if (lrcUrl.startsWith('http://')) {
                            lrcUrl = 'https://' + lrcUrl.slice(7);
                        }
                    }
                    
                    // 兼容不同API的字段名
                    const songName = song.name || song.title || '未知歌曲';
                    const songArtist = song.artist || song.author || '未知歌手';
                    
                    audioList[index] = {
                        name: songName,
                        artist: songArtist,
                        url: audioUrl,
                        cover: coverUrl,
                        lrc: lrcUrl || ''
                    };
                }
            })
            .catch(error => {
                console.error('加载歌曲失败:', error);
            })
            .finally(() => {
                loadedCount++;
                if (loadedCount === songIds.length) {
                    // 所有歌曲加载完成，创建播放器
                    const validAudioList = audioList.filter(audio => audio && audio.url);
                    
                    const ap = new APlayer({
                        container: document.getElementById('aplayer-container'),
                        mini: false,
                        autoplay: false,
                        theme: '#38bdf8',
                        loop: 'all',
                        order: 'list',
                        preload: 'auto',
                        volume: 0.7,
                        mutex: true,
                        listFolded: false,
                        listMaxHeight: '300px',
                        lrcType: 0,
                        audio: validAudioList
                    });
                    
                    // 移除加载提示
                    const loadingEl = document.querySelector('.meting-loading');
                    if (loadingEl) {
                        loadingEl.style.display = 'none';
                    }
                    
                    // 播放状态变化时更新封面动画
                    ap.on('play', function() {
                        const pic = document.querySelector('.aplayer-pic');
                        if (pic) {
                            pic.style.animationPlayState = 'running';
                        }
                    });
                    
                    ap.on('pause', function() {
                        const pic = document.querySelector('.aplayer-pic');
                        if (pic) {
                            pic.style.animationPlayState = 'paused';
                        }
                    });
                }
            });
    });
});
</script>
