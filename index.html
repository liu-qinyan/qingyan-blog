<script>
// 头像彩蛋：勇者觉醒仪式（互动版）
const avatar = document.querySelector('.avatar');
let clickCount = 0;
let easterPhase = 0; // 0: 未触发, 1: 觉醒仪式中, 2: 完全觉醒
let clickTimer = null;
let collectedOrbs = 0;
let awakeningTimer = null;

// 元素引用
const flashOverlay = document.getElementById('flashOverlay');
const awakeningOverlay = document.getElementById('awakeningOverlay');
const awakeningTitle = document.getElementById('awakeningTitle');
const awakeningHint = document.getElementById('awakeningHint');
const orbFire = document.getElementById('orbFire');
const orbWater = document.getElementById('orbWater');
const orbWind = document.getElementById('orbWind');
const awakeningProgress = document.getElementById('awakeningProgress');
const awakeningProgressBar = document.getElementById('awakeningProgressBar');
const awakeningResult = document.getElementById('awakeningResult');
const awakeningQuote = document.getElementById('awakeningQuote');

// 勇者台词库
const heroQuotes = [
  "勇者之力，与我同在！",
  "光明终将驱散黑暗！",
  "为了守护重要的人！",
  "传说中的勇者，觉醒！",
  "这就是...勇者的力量！",
  "冒险才刚刚开始！",
  "勇气是最强大的魔法！"
];

// 头像点击事件
avatar.addEventListener('click', () => {
  // 如果在完全觉醒状态，点击头像退出觉醒
  if (easterPhase === 2) {
    endAwakening();
    return;
  }
  
  if (easterPhase >= 1) return;
  
  // 3秒内不点击就重置计数
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    clickCount = 0;
    avatar.classList.remove('avatar-glow');
  }, 3000);
  
  clickCount++;
  
  // 点击缩放动画
  avatar.classList.remove('avatar-click');
  void avatar.offsetWidth;
  avatar.classList.add('avatar-click');
  
  // 第3次点击：开始发光
  if (clickCount === 3) {
    avatar.classList.add('avatar-glow');
  }
  
  // 第6次点击：触发觉醒仪式！
  if (clickCount >= 6) {
    startAwakeningRitual();
    clickCount = 0;
  }

  easterPhase = 1;
  avatar.classList.remove('avatar-glow');
  
  // 显示遮罩层
  awakeningOverlay.classList.add('active');
  
  // 显示标题

  // 显示提示
  setTimeout(() => {
    awakeningHint.classList.add('show');
  }, 600);
  
  // 显示进度条
  setTimeout(() => {
    awakeningProgress.classList.add('show');
  }, 800);
  
  // 随机位置显示3个能量球
  setTimeout(() => {
    showEnergyOrb(orbFire, 15, 35);
  }, 1000);
  
  setTimeout(() => {
    showEnergyOrb(orbWater, 45, 55);
  }, 1200);
  
  setTimeout(() => {
    showEnergyOrb(orbWind, 75, 40);
  }, 1400);
  
  // 绑定能量球点击事件
  orbFire.addEventListener('click', () => collectOrb(orbFire));
  orbWater.addEventListener('click', () => collectOrb(orbWater));
  orbWind.addEventListener('click', () => collectOrb(orbWind));
}

// 显示能量球（随机位置）
function showEnergyOrb(orb, xPercent, yPercent) {
  const x = xPercent + (Math.random() * 10 - 5);
  const y = yPercent + (Math.random() * 10 - 5);
  orb.style.left = x + '%';
  orb.style.top = y + '%';
  orb.classList.add('show');
}

// 收集能量球
function collectOrb(orb) {
  if (orb.classList.contains('collected')) return;
  
  orb.classList.add('collected');
  collectedOrbs++;
  
  // 更新进度条
  const progress = (collectedOrbs / 3) * 100;
  awakeningProgressBar.style.width = progress + '%';
  
  // 收集特效：生成粒子
  createCollectParticles(orb);
  
  // 检查是否收集完所有能量
  if (collectedOrbs >= 3) {
    setTimeout(() => {
      completeAwakening();
    }, 500);
  }
}

// 收集粒子特效
function createCollectParticles(orb) {
  const rect = orb.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  for (let i = 0; i < 8; i++) {
    const particle = document.createElement('div');
    const angle = (i / 8) * Math.PI * 2;
    const distance = 50 + Math.random() * 30;
    const size = 6 + Math.random() * 6;
    
    particle.style.cssText = `
      position: fixed;
      width: ${size}px;
      height: ${size}px;
      background: radial-gradient(circle, #fbbf24, #f97316);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9994;
      left: ${centerX}px;
      top: ${centerY}px;
      transform: translate(-50%, -50%);
      transition: all 0.6s ease-out;
      opacity: 1;
    `;
    
    document.body.appendChild(particle);
    
    requestAnimationFrame(() => {
      const endX = centerX + Math.cos(angle) * distance;
      const endY = centerY + Math.sin(angle) * distance;
      particle.style.left = endX + 'px';
      particle.style.top = endY + 'px';
      particle.style.opacity = '0';
      particle.style.transform = 'translate(-50%, -50%) scale(0)';
    });
    
    setTimeout(() => {
      particle.remove();
    }, 600);
  }
}

// 完全觉醒
function completeAwakening() {
  easterPhase = 2;
  
  // 隐藏能量球和提示
  orbFire.classList.remove('show');
  orbWater.classList.remove('show');
  orbWind.classList.remove('show');
  awakeningHint.classList.remove('show');
  awakeningTitle.classList.remove('show');
  awakeningProgress.classList.remove('show');
  
  // 屏幕闪光
  setTimeout(() => {
    flashOverlay.classList.add('flash-active');
  }, 100);
  
  // 头像完全觉醒
  setTimeout(() => {
    avatar.classList.add('avatar-awakened');
  }, 200);
  
  // 樱花变成金色
  const petals = document.querySelectorAll('.petal');
  petals.forEach(petal => {
    petal.classList.add('petal-gold');
    const duration = parseFloat(petal.style.animationDuration);
    petal.style.animationDuration = (duration * 0.5) + 's';
  });
  
  // 显示觉醒结果
  setTimeout(() => {
    awakeningResult.classList.add('show');
  }, 400);
  
  // 显示随机勇者台词
  setTimeout(() => {
    const randomQuote = heroQuotes[Math.floor(Math.random() * heroQuotes.length)];
    awakeningQuote.textContent = `"${randomQuote}"`;
    awakeningQuote.classList.add('show');
  }, 600);
  
  // 看板娘说特殊的话
  const live2dTip = document.getElementById('live2dTip');
  if (live2dTip) {
    setTimeout(() => {
      live2dTip.textContent = '哇！勇者大人觉醒了！✨';
    }, 800);
  }
  
  // 15秒后自动结束觉醒
  awakeningTimer = setTimeout(() => {
    endAwakening();
  }, 15000);
}

// 结束觉醒
function endAwakening() {
  clearTimeout(awakeningTimer);
  
  // 隐藏所有觉醒元素
  awakeningOverlay.classList.remove('active');
  awakeningResult.classList.remove('show');
  awakeningQuote.classList.remove('show');
  flashOverlay.classList.remove('flash-active');
  avatar.classList.remove('avatar-awakened');
  
  // 恢复樱花
  const petals = document.querySelectorAll('.petal');
  petals.forEach(petal => {
    petal.classList.remove('petal-gold');
    const duration = parseFloat(petal.style.animationDuration);
    petal.style.animationDuration = (duration * 2) + 's';
  });
  
  // 重置能量球状态
  collectedOrbs = 0;
  awakeningProgressBar.style.width = '0%';
  [orbFire, orbWater, orbWind].forEach(orb => {
    orb.classList.remove('show', 'collected');
  });
  
  // 重置看板娘
  const live2dTip = document.getElementById('live2dTip');
  if (live2dTip) {
    live2dTip.textContent = '欢迎来到柳卿烟的小窝～';
  }
  
  // 重置状态
  setTimeout(() => {
    easterPhase = 0;
  }, 500);
}

// 觉醒状态下点击空白处生成金色大樱花
document.addEventListener('click', function(e) {
  if (easterPhase !== 2) return;
  if (e.target.closest('.avatar')) return;
  if (e.target.closest('.live2d-container')) return;
  
  // 生成3-5个金色大樱花
  const count = Math.floor(Math.random() * 3) + 3;
  for (let i = 0; i < count; i++) {
    const petal = document.createElement('div');
    const size = Math.random() * 10 + 15; // 15-25px，比普通的大
    const moveY = -(Math.random() * 80 + 60);
    const moveX = Math.random() * 60 - 30;
    const rotate = Math.random() * 720 - 360;
    const duration = Math.random() * 0.5 + 1.2;
    
    petal.style.cssText = `
      position: fixed;
      width: ${size}px;
      height: ${size}px;
      background: linear-gradient(135deg, #fbbf24, #fcd34d);
      border-radius: 50% 0 50% 50%;
      opacity: 0.9;
      pointer-events: none;
      z-index: 9998;
      left: ${e.clientX + Math.random()*30-15}px;
      top: ${e.clientY + Math.random()*30-15}px;
      transform: rotate(${Math.random()*360}deg) scale(1);
      transition: all ${duration}s ease-out;
      box-shadow: 0 0 10px #fbbf2480;
    `;
    
    document.body.appendChild(petal);
    
    requestAnimationFrame(() => {
      petal.style.opacity = "0";
      petal.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${rotate}deg) scale(0.2)`;
    });
    
    setTimeout(() => {
      petal.remove();
    }, duration * 1000 + 50);
  }
});
</script>
