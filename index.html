<script>
// 樱花飘落特效 - 升级版（多层级+摆动+柔光）
(function() {
  const sakuraContainer = document.getElementById("sakuraContainer");
  if (!sakuraContainer) return;
  
  // 三层樱花：远景(小、淡、慢)、中景(正常)、近景(大、深、快)
  const layers = [
    { count: 8, sizeMin: 6, sizeMax: 10, opacity: 0.4, speedMin: 20, speedMax: 30, glow: 3 },
    { count: 12, sizeMin: 10, sizeMax: 16, opacity: 0.7, speedMin: 12, speedMax: 20, glow: 6 },
    { count: 5, sizeMin: 16, sizeMax: 24, opacity: 0.9, speedMin: 8, speedMax: 14, glow: 10 }
  ];
  
  layers.forEach((layer, layerIndex) => {
    for (let i = 0; i < layer.count; i++) {
      const sakura = document.createElement("div");
      sakura.className = "sakura-petal sakura-layer-" + layerIndex;
      sakura.setAttribute("data-astro-cid-j7pv25f6", "");
      
      const size = Math.random() * (layer.sizeMax - layer.sizeMin) + layer.sizeMin;
      sakura.style.width = size + "px";
      sakura.style.height = size * 1.4 + "px";
      sakura.style.left = (Math.random() * 90 + 5) + "%";
      sakura.style.animationDuration = (Math.random() * (layer.speedMax - layer.speedMin) + layer.speedMin) + "s";
      sakura.style.animationDelay = Math.random() * layer.speedMax + "s";
      sakura.style.opacity = layer.opacity;
      sakura.style.setProperty('--glow-size', layer.glow + 'px');
      sakura.style.setProperty('--swing-amount', (Math.random() * 30 + 20) + 'px');
      
      sakuraContainer.appendChild(sakura);
    }
  });
})();

// 点击樱花特效
(function() {
  const sakuraContainer = document.getElementById("sakuraContainer");
  if (!sakuraContainer) return;
  
  document.addEventListener("click", function(e) {
    // 每次点击生成 5 朵细小的樱花
    const count = 5;
    for (let i = 0; i < count; i++) {
      const sakura = document.createElement("div");
      sakura.className = "sakura-click";
      
      // 细小的樱花尺寸
      const size = Math.random() * 4 + 6;
      sakura.style.width = size + "px";
      sakura.style.height = size * 1.4 + "px";
      
      // 在点击位置附近随机分布
      const offsetX = Math.random() * 40 - 20;
      const offsetY = Math.random() * 20 - 10;
      sakura.style.left = (e.clientX + offsetX) + "px";
      sakura.style.top = (e.clientY + offsetY) + "px";
      
      // 随机动画延迟
      sakura.style.animationDelay = (Math.random() * 0.3) + "s";
      
      sakuraContainer.appendChild(sakura);
      
      // 动画结束后移除
      setTimeout(function() {
        if (sakura.parentNode) {
          sakura.parentNode.removeChild(sakura);
        }
      }, 1800);
    }
  });
})();

// 今日状态卡片动态更新
(function() {
  const greetingEl = document.getElementById('statusGreeting');
  const dateEl = document.getElementById('statusDate');
  
  if (!greetingEl || !dateEl) return;
  
  const now = new Date();
  const hour = now.getHours();
  
  // 根据时间段设置问候语
  let greeting = '你好～';
  if (hour >= 5 && hour < 11) {
    greeting = '早上好～';
  } else if (hour >= 11 && hour < 13) {
    greeting = '中午好～';
  } else if (hour >= 13 && hour < 18) {
    greeting = '下午好～';
  } else if (hour >= 18 && hour < 22) {
    greeting = '晚上好～';
  } else {
    greeting = '夜深了～';
  }
  greetingEl.textContent = greeting;
  
  // 更新日期
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const weekDay = weekDays[now.getDay()];
  dateEl.textContent = month + '月' + day + '日 ' + weekDay;
})();
</script>
